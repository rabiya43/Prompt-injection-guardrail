version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      # Pass through the API key for the judge
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGINS=http://localhost:5173,http://localhost
    # Optional: Mount results to persist local eval data
    volumes:
      - ./results:/app/results

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        # Bake the API URL into the frontend
        - VITE_API_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - api
